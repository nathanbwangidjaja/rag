<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocStack — Knowledge Graph</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: { "primary": "#2463eb" },
            fontFamily: { "display": ["Inter", "sans-serif"] },
        },
    },
}
</script>
<style>
body { font-family: 'Inter', sans-serif; }
.glass-panel {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.3);
}
#graph-canvas { width: 100%; height: 100%; }
</style>
</head>
<body class="bg-[#fdfdfe] text-slate-900 font-display">
<div class="relative flex h-screen w-full flex-col overflow-hidden">

<!-- Header -->
<header class="z-50 flex items-center justify-between px-8 py-4 glass-panel border-b border-slate-200/50">
    <div class="flex items-center gap-3">
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/20">
            <span class="material-symbols-outlined text-2xl">hub</span>
        </div>
        <div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">DocStack</h1>
            <p class="text-[10px] font-semibold uppercase tracking-widest text-primary/80">Knowledge Graph</p>
        </div>
    </div>
    <div class="flex items-center gap-4">
        <a href="/" class="flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-sm">chat</span>
            Back to Chat
        </a>
        <div class="hidden md:flex items-center gap-2 rounded-full bg-slate-100 px-4 py-1.5 border border-slate-200">
            <span class="material-symbols-outlined text-sm text-slate-500">hub</span>
            <span id="stats-text" class="text-xs font-medium text-slate-600">Loading...</span>
        </div>
    </div>
</header>

<main class="relative flex flex-1 overflow-hidden">

    <!-- Graph Canvas -->
    <div class="flex-1 relative bg-gradient-to-br from-slate-50 to-blue-50/30">
        <!-- Search bar -->
        <div class="absolute top-4 left-4 z-10">
            <div class="glass-panel flex items-center gap-2 rounded-xl border border-white px-4 py-2 shadow-lg">
                <span class="material-symbols-outlined text-slate-400 text-sm">search</span>
                <input id="search-input" type="text" placeholder="Search entities..." class="bg-transparent border-none text-sm text-slate-700 placeholder:text-slate-400 focus:ring-0 w-56"/>
            </div>
        </div>

        <!-- Legend -->
        <div class="absolute bottom-4 left-4 z-10">
            <div class="glass-panel rounded-xl border border-white px-4 py-3 shadow-lg">
                <p class="text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-2">Entity Types</p>
                <div class="flex flex-wrap gap-2" id="legend"></div>
            </div>
        </div>

        <div id="graph-canvas"></div>
    </div>

    <!-- Detail Sidebar -->
    <div id="detail-panel" class="hidden w-80 border-l border-slate-200/50 bg-white/80 backdrop-blur-sm overflow-y-auto">
        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-800" id="detail-name">—</h2>
                <button onclick="closeDetail()" class="text-slate-400 hover:text-slate-600">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>
            <div class="space-y-4">
                <div>
                    <span id="detail-type" class="inline-block rounded-full px-2.5 py-0.5 text-[10px] font-bold uppercase tracking-wider"></span>
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Description</p>
                    <p id="detail-desc" class="text-sm text-slate-700">—</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Mentions</p>
                    <p id="detail-mentions" class="text-sm text-slate-700">—</p>
                </div>
                <div>
                    <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Connected Entities</p>
                    <div id="detail-connections" class="space-y-1"></div>
                </div>
            </div>
        </div>
    </div>

</main>
</div>

<script src="/static/graph.js"></script>
</body>
</html>
